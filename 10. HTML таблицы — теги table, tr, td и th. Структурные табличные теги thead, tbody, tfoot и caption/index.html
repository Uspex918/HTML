<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <table>
            <caption>
                This is a table
            </caption>
            <tbody>
                <tr>
                    <th>Name</th>
                    <th>Number</th>
                    <th rowspan="2">some</th>
                </tr>
                <tr>
                    <td>Alexandr</td>
                    <td>101</td>
                </tr>
                <tr>
                    <td colspan="2">Alexey</td>
                    <td>102</td>
                </tr>
                <tr>
                    <td colspan="2">Mixail</td>
                    <td>103</td>
                </tr>
            </tbody>
        </table>
    </body>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</html>
